<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BTC Trader Remote</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; }
.header { background:#161b22; padding:16px 20px; border-bottom:1px solid #30363d; text-align:center; }
.header h1 { font-size:18px; color:#f0883e; }
.header .sub { font-size:12px; color:#8b949e; margin-top:4px; }
.container { max-width:500px; margin:0 auto; padding:16px; padding-bottom:80px; }
.section { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:16px; margin-bottom:16px; }
.section h2 { font-size:14px; color:#8b949e; margin-bottom:12px; }
.status-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #21262d; }
.status-row:last-child { border-bottom:none; }
.status-label { font-size:14px; }
.status-val { font-size:14px; font-weight:600; }
.green { color:#3fb950; }
.red { color:#f85149; }
.yellow { color:#d29922; }

.btn { width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:10px; transition:opacity 0.2s; }
.btn:active { opacity:0.7; }
.btn-danger { background:#da3633; color:white; }
.btn-danger.active { background:#238636; }
.btn-warning { background:#9e6a03; color:white; }
.btn-warning.active { background:#238636; }
.btn-primary { background:#1f6feb; color:white; }
.btn-secondary { background:#21262d; color:#c9d1d9; border:1px solid #30363d; }

.strategy-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.strategy-btn { padding:12px 8px; border:2px solid #30363d; border-radius:10px; background:#0d1117; color:#c9d1d9; font-size:13px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s; }
.strategy-btn:active { opacity:0.7; }
.strategy-btn.selected { border-color:#58a6ff; background:#0d1117; color:#58a6ff; }

.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#238636; color:white; padding:12px 24px; border-radius:10px; font-size:14px; display:none; z-index:100; }
.toast.error { background:#da3633; }
.toast.show { display:block; animation:fadeInOut 2s ease; }
@keyframes fadeInOut { 0%{opacity:0;transform:translateX(-50%) translateY(-10px);} 15%{opacity:1;transform:translateX(-50%) translateY(0);} 85%{opacity:1;} 100%{opacity:0;} }

.nav { display:flex; justify-content:center; gap:12px; padding:12px; background:#161b22; border-top:1px solid #30363d; position:fixed; bottom:0; left:0; right:0; }
.nav a { color:#8b949e; text-decoration:none; font-size:13px; padding:8px 16px; border-radius:8px; }
.nav a.active { background:#21262d; color:#f0883e; }
</style>
</head>
<body>
<div class="header">
  <h1>Remote Control</h1>
  <div class="sub" id="server-time">-</div>
</div>

<div class="container">
  <!-- 긴급 정지 -->
  <div class="section">
    <h2>Emergency Control</h2>
    <button class="btn btn-danger" id="btn-emergency" onclick="toggleEmergency()">
      EMERGENCY STOP: Loading...
    </button>
    <button class="btn btn-warning" id="btn-dryrun" onclick="toggleDryRun()">
      DRY RUN: Loading...
    </button>
  </div>

  <!-- 현재 상태 -->
  <div class="section">
    <h2>Current Status</h2>
    <div class="status-row">
      <span class="status-label">Max Trade</span>
      <span class="status-val" id="st-max-trade">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">Daily Limit</span>
      <span class="status-val" id="st-daily">-</span>
    </div>
    <div class="status-row">
      <span class="status-label">Position Ratio</span>
      <span class="status-val" id="st-ratio">-</span>
    </div>
  </div>

  <!-- 전략 변경 -->
  <div class="section">
    <h2>Strategy</h2>
    <div id="current-strategy" style="font-size:16px;font-weight:600;text-align:center;padding:8px;color:#58a6ff;">-</div>
    <div class="strategy-grid">
      <button class="strategy-btn" id="strat-conservative" onclick="setStrategy('conservative')">
        🛡️<br>Conservative
      </button>
      <button class="strategy-btn" id="strat-moderate" onclick="setStrategy('moderate')">
        ⚖️<br>Moderate
      </button>
      <button class="strategy-btn" id="strat-aggressive" onclick="setStrategy('aggressive')">
        🔥<br>Aggressive
      </button>
    </div>
  </div>

  <!-- 수동 실행 -->
  <div class="section">
    <h2>Manual Actions</h2>
    <button class="btn btn-primary" onclick="runAnalysis()">Run Analysis Now</button>
    <button class="btn btn-secondary" onclick="location.href='/'">View Dashboard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="nav">
  <a href="/">Dashboard</a>
  <a href="/remote.html" class="active">Remote</a>
</nav>

<script>
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2000);
}

async function fetchJSON(url, opts) {
  try {
    const r = await fetch(url, opts);
    return await r.json();
  } catch(e) { return {error: e.message}; }
}

async function loadStatus() {
  const d = await fetchJSON('/api/status');
  if(d.error) return;

  document.getElementById('server-time').textContent = d.server_time||'';

  // Emergency Stop
  const eBtn = document.getElementById('btn-emergency');
  const isStop = d.emergency_stop === 'true';
  eBtn.textContent = 'EMERGENCY STOP: ' + (isStop ? 'ON' : 'OFF');
  eBtn.className = 'btn ' + (isStop ? 'btn-danger' : 'btn-danger active');

  // Dry Run
  const dBtn = document.getElementById('btn-dryrun');
  const isDry = d.dry_run === 'true';
  dBtn.textContent = 'DRY RUN: ' + (isDry ? 'ON' : 'OFF');
  dBtn.className = 'btn ' + (isDry ? 'btn-warning active' : 'btn-warning');

  // Status
  document.getElementById('st-max-trade').textContent = Number(d.max_trade_amount||0).toLocaleString() + ' KRW';
  document.getElementById('st-daily').textContent = (d.max_daily_trades||'-') + ' trades';
  document.getElementById('st-ratio').textContent = (Number(d.max_position_ratio||0)*100) + '%';

  // Strategy
  const strat = d.strategy || '';
  document.getElementById('current-strategy').textContent = strat;
  document.querySelectorAll('.strategy-btn').forEach(b => b.classList.remove('selected'));
  if(strat.includes('conservative') || strat.includes('보수적')) document.getElementById('strat-conservative').classList.add('selected');
  else if(strat.includes('moderate') || strat.includes('보통')) document.getElementById('strat-moderate').classList.add('selected');
  else if(strat.includes('aggressive') || strat.includes('공격적')) document.getElementById('strat-aggressive').classList.add('selected');
}

async function toggleEmergency() {
  const d = await fetchJSON('/api/emergency-stop', {method:'POST'});
  if(d.error) { showToast('Error: '+d.error, true); return; }
  showToast('Emergency Stop: ' + d.emergency_stop);
  loadStatus();
}

async function toggleDryRun() {
  const d = await fetchJSON('/api/dry-run', {method:'POST'});
  if(d.error) { showToast('Error: '+d.error, true); return; }
  showToast('Dry Run: ' + d.dry_run);
  loadStatus();
}

async function setStrategy(key) {
  const d = await fetchJSON('/api/strategy', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({strategy: key})
  });
  if(d.error) { showToast('Error: '+d.error, true); return; }
  showToast('Strategy: ' + d.strategy);
  loadStatus();
}

async function runAnalysis() {
  showToast('Analysis started...');
  const d = await fetchJSON('/api/run', {method:'POST'});
  if(d.error) showToast('Error: '+d.error, true);
}

loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
